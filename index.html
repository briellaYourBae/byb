<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrieLLa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="./public/img/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
        html { scroll-behavior: smooth; }
        @keyframes float { 
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
        @keyframes zoomIn { 
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.5); opacity: 0.9; }
            60% { transform: scale(5); opacity: 0.5; }
            100% { transform: scale(30); opacity: 0; }
        }
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .float-logo { animation: float 3s ease-in-out infinite; }
        .zoom-logo { animation: zoomIn 2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-shine:hover::before {
            left: 100%;
        }
    </style>
</head>

<body class="bg-[#1F252E] font-['Poppins'] min-h-screen pt-8 pb-32 overflow-x-hidden">
   <!-- Loading Screen -->
   <div id="loader" class="fixed inset-0 bg-[#1F252E] z-[100] flex items-center justify-center">
        <img src="./public/img/logo.png" alt="Loading" class="w-32 h-32 float-logo" id="logo">
   </div>
   <!-- Footer Copyright - Fixed on Top -->
   <footer class="bg-gray-800/70 text-white py-2 fixed top-0 left-0 w-full backdrop-blur-md z-40">
        <div class="container mx-auto text-center">
            <p class="text-xs" id="footer-text"></p>
        </div>
    </footer>

   <!-- Navbar Baru - Fixed on Bottom -->
   <header class="mx-4 md:mx-8 px-4 md:px-8 py-3 md:py-4 bg-[#0a0f1a]/90 backdrop-blur-md fixed bottom-4 md:bottom-6 left-0 right-0 max-w-7xl flex justify-between items-center z-50 rounded-full border border-gray-700/50 shadow-2xl" style="margin-left: auto; margin-right: auto;">
        <div class="logo text-lg md:text-xl font-extrabold">
            <a href="index.html" class="text-white hover:text-purple-400 font-semibold transition-colors">BrieLLa.YB</a>
        </div>
        <button id="menu-toggle" class="lg:hidden text-purple-400 text-2xl">
            <i class="bi bi-list"></i>
        </button>
        <nav id="navbar" class="hidden lg:flex lg:items-center lg:space-x-8">
            <a href="index.html" class="relative text-purple-400 font-semibold transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-0.5 after:bg-purple-400">Home</a>
            <a href="pages/biodata.html" class="relative text-white hover:text-purple-400 font-medium transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-purple-400 after:transition-all after:duration-300 hover:after:w-full">Briella?</a>
            <a href="pages/project.html" class="relative text-white hover:text-purple-400 font-medium transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-purple-400 after:transition-all after:duration-300 hover:after:w-full">Project</a>
            <a href="pages/cnt.html" class="btn-shine border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-6 py-2 rounded-full font-medium transition-all">Contact</a>
        </nav>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="lg:hidden fixed inset-0 bg-[#1F252E] z-50 transform -translate-x-full transition-transform duration-500 ease-in-out flex flex-col">
        <div class="flex justify-end p-4">
            <button id="close-menu" class="text-white text-2xl">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="flex flex-col items-center justify-center space-y-6 flex-1 pb-20">
            <a href="index.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Home</a>
            <a href="pages/biodata.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Briella?</a>
            <a href="pages/project.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Project</a>
            <a href="pages/cnt.html" class="btn-shine border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-10 py-4 rounded-full font-semibold text-xl">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="px-4 md:px-8 py-8 md:py-16 animate__animated animate__fadeIn">
        <div class="flex flex-col lg:flex-row items-center justify-between max-w-7xl mx-auto space-y-8 lg:space-y-0 lg:space-x-12">
            <div class="text-white space-y-4 md:space-y-6 max-w-xl text-center lg:text-left" data-aos="fade-right">
                <div class="inline-block px-4 py-2 bg-purple-500/20 rounded-full text-purple-300 text-sm mb-2">
                    <i class="bi bi-code-slash"></i> Welcome to my portfolio
                </div>
                <h1 class="text-4xl md:text-5xl lg:text-7xl font-bold leading-tight">
                    <span class="block text-xl md:text-2xl lg:text-3xl font-normal text-gray-400 mb-2">Hello, I'm</span>
                    <span class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">BrieLLa</span>
                </h1>
                <p class="text-lg md:text-xl lg:text-2xl text-gray-300">Frontend Developer & Student</p>
                <p class="text-gray-400 text-base md:text-lg">Passionate about creating beautiful, responsive, and user-friendly web applications with modern technologies.</p>
                <div class="flex flex-col sm:flex-row flex-wrap justify-center lg:justify-start gap-4 pt-4">
                    <a href="pages/biodata.html" class="btn-shine bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-full font-semibold transition-all hover:scale-105 shadow-lg text-center">About Me</a>
                    <a href="pages/project.html" class="btn-shine border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-8 py-4 rounded-full font-semibold transition-all hover:scale-105 text-center">View Projects</a>
                </div>
            </div>
            <div class="w-full max-w-sm lg:w-[500px]" data-aos="fade-left">
                <div class="relative">
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full blur-3xl opacity-30 animate__animated animate__pulse animate__slow animate__infinite"></div>
                    <img src="./public/img/logo.png" alt="BrieLLa Logo" class="relative w-full rounded-full shadow-2xl">
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Mobile menu toggle
        document.getElementById('menu-toggle').addEventListener('click', function () {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.remove('hidden');
            setTimeout(() => {
                mobileMenu.classList.remove('-translate-x-full');
                mobileMenu.classList.add('translate-x-0'); 
            }, 10);
        });

        document.getElementById('close-menu').addEventListener('click', function () {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.remove('translate-x-0');
            mobileMenu.classList.add('-translate-x-full'); 
            setTimeout(() => {
                mobileMenu.classList.add('hidden');
            }, 500); 
        });

        // Copyright
        const footerText = document.getElementById('footer-text');
        const year = new Date().getFullYear();
        footerText.textContent = `© ${year} BrieLLa.YB - All Rights Reserved`;

        // Loading animation
        if (!sessionStorage.getItem('visited')) {
            setTimeout(() => {
                document.getElementById('logo').classList.remove('float-logo');
                document.getElementById('logo').classList.add('zoom-logo');
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    sessionStorage.setItem('visited', 'true');
                }, 2000);
            }, 1500);
        } else {
            document.getElementById('loader').style.display = 'none';
        }

        // AOS Init
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me - BrieLLa.YB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="../public/img/logo.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
  <style>
    html { scroll-behavior: smooth; }
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-shine:hover::before {
      left: 100%;
    }
  </style>
</head>

<body class="bg-[#1F252E] font-['Poppins'] min-h-screen pt-8 pb-32 overflow-x-hidden">
   <!-- Footer Copyright - Fixed on Top -->
   <footer class="bg-gray-800/70 text-white py-2 fixed top-0 left-0 w-full backdrop-blur-md z-40">
        <div class="container mx-auto text-center">
            <p class="text-xs" id="footer-text"></p>
        </div>
    </footer>

   <!-- Navbar Baru - Fixed on Bottom -->
   <header class="mx-4 md:mx-8 px-4 md:px-8 py-3 md:py-4 bg-[#0a0f1a]/90 backdrop-blur-md fixed bottom-4 md:bottom-6 left-0 right-0 max-w-7xl flex justify-between items-center z-50 rounded-full border border-gray-700/50 shadow-2xl" style="margin-left: auto; margin-right: auto;">
        <div class="logo text-xl font-extrabold">
            <a href="../index.html" class="text-white hover:text-purple-400 font-semibold transition-colors">BrieLLa.YB</a>
        </div>
        <button id="menu-toggle" class="lg:hidden text-purple-400 text-2xl">
            <i class="bi bi-list"></i>
        </button>
        <nav id="navbar" class="hidden lg:flex lg:items-center lg:space-x-8">
            <a href="../index.html" class="relative text-white hover:text-purple-400 font-medium transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-purple-400 after:transition-all after:duration-300 hover:after:w-full">Home</a>
            <a href="biodata.html" class="relative text-white hover:text-purple-400 font-medium transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-purple-400 after:transition-all after:duration-300 hover:after:w-full">Briella?</a>
            <a href="project.html" class="relative text-white hover:text-purple-400 font-medium transition-colors pb-1 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-purple-400 after:transition-all after:duration-300 hover:after:w-full">Project</a>
            <a href="cnt.html" class="btn-shine border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-6 py-2 rounded-full font-medium transition-all">Contact</a>
        </nav>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="lg:hidden fixed inset-0 bg-[#1F252E] z-50 transform -translate-x-full transition-transform duration-500 ease-in-out flex flex-col">
        <div class="flex justify-end p-4">
            <button id="close-menu" class="text-white text-2xl">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="flex flex-col items-center justify-center space-y-6 flex-1 pb-20">
            <a href="../index.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Home</a>
            <a href="biodata.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Briella?</a>
            <a href="project.html" class="text-white hover:text-purple-400 font-semibold text-2xl">Project</a>
            <a href="cnt.html" class="btn-shine border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-10 py-4 rounded-full font-semibold text-xl">Contact</a>
        </div>
    </div>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-12 pb-32">
    <div class="text-center mb-8 md:mb-12" data-aos="fade-down">
      <div class="inline-block px-4 py-2 bg-purple-500/20 rounded-full text-purple-300 text-sm mb-4">
        <i class="bi bi-envelope-fill"></i> Get In Touch
      </div>
      <h1 class="text-3xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Contact Me</h1>
      <p class="text-gray-400 max-w-2xl mx-auto text-sm md:text-base">Have a question or want to work together? Feel free to reach out!</p>
    </div>

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8">
      <!-- Contact Info -->
      <div data-aos="fade-right">
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-6 md:p-8 shadow-2xl border border-purple-500/20 h-full">
          <h2 class="text-2xl font-bold text-white mb-6">Contact Information</h2>
          <div class="space-y-4 mb-8">
            <div class="flex items-center gap-4 p-4 bg-gray-700/50 rounded-lg hover:bg-gray-700 transition-all">
              <div class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center flex-shrink-0">
                <i class="bi bi-envelope-fill text-white text-xl"></i>
              </div>
              <div>
                <p class="text-gray-400 text-sm">Email</p>
                <a href="mailto:brielladev@gmail.com" class="text-white hover:text-purple-400 transition-colors font-medium">brielladev@gmail.com</a>
              </div>
            </div>
            <div class="flex items-center gap-4 p-4 bg-gray-700/50 rounded-lg">
              <div class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center flex-shrink-0">
                <i class="bi bi-geo-alt-fill text-white text-xl"></i>
              </div>
              <div>
                <p class="text-gray-400 text-sm">Location</p>
                <p class="text-white font-medium">Purwokerto, Indonesia</p>
              </div>
            </div>
          </div>
          <div class="border-t border-gray-700 pt-6">
            <h3 class="text-lg font-semibold text-white mb-4">Follow Me</h3>
            <div class="flex flex-wrap gap-3">
              <a href="https://github.com/briellaYourBae" class="w-12 h-12 bg-gray-700 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-all hover:scale-110">
                <i class="bi bi-github text-white text-xl"></i>
              </a>
              <a href="https://www.youtube.com/@briellainhere" class="w-12 h-12 bg-gray-700 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-all hover:scale-110">
                <i class="bi bi-youtube text-white text-xl"></i>
              </a>
              <a href="https://www.linkedin.com/in/muhammad-faqih-163b6231a" class="w-12 h-12 bg-gray-700 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-all hover:scale-110">
                <i class="bi bi-linkedin text-white text-xl"></i>
              </a>
              <a href="https://www.tiktok.com/@briellaa.yb" class="w-12 h-12 bg-gray-700 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-all hover:scale-110">
                <i class="bi bi-tiktok text-white text-xl"></i>
              </a>
              <a href="https://www.instagram.com/voidbriella" class="w-12 h-12 bg-gray-700 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-all hover:scale-110">
                <i class="bi bi-instagram text-white text-xl"></i>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div data-aos="fade-left">
        <form id="contactForm" action="https://formspree.io/f/xnnqkalp" method="POST" target="_blank" class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-6 md:p-8 shadow-2xl border border-purple-500/20">
          <h2 class="text-2xl font-bold text-white mb-6">Send Message</h2>
          <div class="space-y-4">
            <div>
              <label for="name" class="block text-gray-300 mb-2 font-medium">Name</label>
              <input type="text" id="name" name="name" required class="w-full bg-gray-700 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
            </div>
            <div>
              <label for="email" class="block text-gray-300 mb-2 font-medium">Email</label>
              <input type="email" id="email" name="email" required class="w-full bg-gray-700 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
            </div>
            <div>
              <label for="message" class="block text-gray-300 mb-2 font-medium">Message</label>
              <textarea id="message" name="message" rows="5" required class="w-full bg-gray-700 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none"></textarea>
            </div>
            <div id="confirmationMessage" class="hidden bg-green-500/20 border border-green-500 text-green-400 px-4 py-3 rounded-lg text-center">
              <i class="bi bi-check-circle-fill mr-2"></i>Message sent successfully!
            </div>
            <button type="submit" class="btn-shine w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold transition-all hover:scale-105 shadow-lg">
              <i class="bi bi-send-fill mr-2"></i>Send Message
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();

    document.getElementById('menu-toggle').addEventListener('click', () => {
      const mobileMenu = document.getElementById('mobile-menu');
      mobileMenu.classList.toggle('transform');
      mobileMenu.classList.toggle('-translate-x-full');
      mobileMenu.classList.toggle('translate-x-0');
    });

    document.getElementById('close-menu').addEventListener('click', () => {
      const mobileMenu = document.getElementById('mobile-menu');
      mobileMenu.classList.add('transform', '-translate-x-full');
      mobileMenu.classList.remove('translate-x-0');
    });

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const confirmationMessage = document.getElementById('confirmationMessage');
      confirmationMessage.classList.remove('hidden');
      this.reset();
      setTimeout(() => confirmationMessage.classList.add('hidden'), 3000);
    });

    document.getElementById('footer-text').innerHTML = `&copy; ${new Date().getFullYear()} BrieLLa.YB. All Rights Reserved.`;
  </script>
</body>
</html>
